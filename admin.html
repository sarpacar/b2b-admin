<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b2b house — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --red: #c0392b; --warm: #f0e6d3; --dark: #0a0806; --card: #141210; --border: rgba(240,230,211,0.12); }
body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--warm); min-height: 100vh; padding: 40px 24px; }

header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 48px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; }
.badge { font-size: 0.7rem; letter-spacing: 0.15em; background: var(--red); color: #fff; padding: 3px 8px; border-radius: 2px; }

.container { max-width: 860px; margin: 0 auto; }
h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.1em; margin-bottom: 20px; color: var(--warm); opacity: 0.7; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 20px 24px; margin-bottom: 28px; }
.card h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; font-size: 1rem; margin-bottom: 12px; color: var(--red); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 0.75rem; letter-spacing: 0.1em; opacity: 0.5; }
input, select {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--warm); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  padding: 10px 12px; border-radius: 4px; outline: none; transition: border-color 0.2s;
}
input:focus, select:focus { border-color: rgba(240,230,211,0.4); }
input::placeholder { opacity: 0.3; }

.btn { border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.12em; padding: 11px 28px; border-radius: 4px; transition: opacity 0.2s; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { opacity: 0.85; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--warm); }
.btn-ghost:hover { border-color: rgba(240,230,211,0.4); }
.btn-green { background: #2d6a4f; color: #fff; }
.btn-green:hover { opacity: 0.85; }
.btn-green:disabled { opacity: 0.4; cursor: not-allowed; }

.status { font-size: 0.82rem; margin-left: 12px; opacity: 0.6; }
.status.ok { color: #4caf50; opacity: 1; }
.status.err { color: #e74c3c; opacity: 1; }

.event-row {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 6px;
  display: flex; align-items: center; gap: 16px; padding: 14px 18px; margin-bottom: 10px;
}
.ev-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.06em; min-width: 60px; color: var(--red); }
.ev-info { flex: 1; }
.ev-name { font-weight: 500; font-size: 0.95rem; }
.ev-sub { font-size: 0.8rem; opacity: 0.45; margin-top: 2px; }
.btn-del { background: transparent; border: 1px solid rgba(192,57,43,0.4); color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 6px 12px; border-radius: 3px; cursor: pointer; transition: background 0.2s; }
.btn-del:hover { background: rgba(192,57,43,0.15); }

.token-saved { display: inline-block; font-size: 0.78rem; background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); padding: 3px 10px; border-radius: 3px; margin-left: 10px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">b2b house</div>
    <div class="badge">ADMIN</div>
  </header>

  <!-- GITHUB TOKEN -->
  <div class="card">
    <h3>GitHub Bağlantısı</h3>
    <p style="font-size:0.82rem;opacity:0.5;margin-bottom:14px;">Token sadece bu sayfada (tarayıcı hafızasında) kalır.</p>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <input type="password" id="gh-token" placeholder="github_pat_..." style="flex:1;min-width:260px;">
      <button class="btn btn-ghost" onclick="saveToken()">Kaydet</button>
      <span id="token-status"></span>
    </div>
  </div>

  <!-- ADD EVENT -->
  <div class="card">
    <h3>Yeni Event Ekle</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>GÜN</label>
        <input type="text" id="f-day" placeholder="12" maxlength="2">
      </div>
      <div class="form-group">
        <label>AY</label>
        <select id="f-month">
          <option value="">— seç —</option>
          <option>Jan</option><option>Feb</option><option>Mar</option>
          <option>Apr</option><option>May</option><option>Jun</option>
          <option>Jul</option><option>Aug</option><option>Sep</option>
          <option>Oct</option><option>Nov</option><option>Dec</option>
        </select>
      </div>
      <div class="form-group">
        <label>MEKAN</label>
        <input type="text" id="f-venue" placeholder="Fabric">
      </div>
      <div class="form-group">
        <label>EVENT ADI</label>
        <input type="text" id="f-name" placeholder="b2b Night Vol. 7">
      </div>
      <div class="form-group">
        <label>ŞEHİR</label>
        <input type="text" id="f-city" placeholder="London, UK">
      </div>
      <div class="form-group">
        <label>BİLET URL</label>
        <input type="url" id="f-ticket" placeholder="https://...">
      </div>
    </div>
    <button class="btn btn-red" onclick="addEvent()">+ Ekle</button>
  </div>

  <!-- EVENT LIST -->
  <h2>Mevcut Events</h2>
  <div id="event-list" style="margin-bottom:28px;"></div>

  <!-- PUBLISH -->
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:60px;">
    <button class="btn btn-green" id="btn-publish" onclick="publishToGitHub()">🚀 Siteyi Güncelle</button>
    <span id="publish-status" class="status"></span>
  </div>
</div>

<script>
  const OWNER  = 'sarpacar';
  const REPO   = 'b2b-admin';
  const FILE   = 'index.html';
  const BRANCH = 'main';

  // ─── TOKEN ───────────────────────────────────────────────────────
  let ghToken = localStorage.getItem('b2b_gh_token') || '';

  function saveToken() {
    const val = document.getElementById('gh-token').value.trim();
    if (!val) return;
    ghToken = val;
    localStorage.setItem('b2b_gh_token', val);
    document.getElementById('gh-token').value = '';
    document.getElementById('token-status').innerHTML = '<span class="token-saved">✓ Kaydedildi</span>';
  }

  // ─── STATE ───────────────────────────────────────────────────────
  let events = [];
  let siteHTML = ''; // index.html'in tam içeriği

  // Sayfa açılınca GitHub'dan index.html'i çek ve events'i parse et
  async function init() {
    try {
      const token = localStorage.getItem('b2b_gh_token');
      const headers = token
        ? { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        : { 'Accept': 'application/vnd.github.v3+json' };
      
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
        { headers }
      );
      if (!res.ok) throw new Error('fetch failed: ' + res.status);
      const data = await res.json();
      // GitHub API base64 encode edilmiş içerik döndürür
      siteHTML = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      events = parseEventsFromHTML(siteHTML);
    } catch(e) {
      console.warn('index.html çekilemedi:', e);
      events = getDefaultEvents();
    }
    render();
  }

  function parseEventsFromHTML(html) {
    try {
      const match = html.match(/const EVENTS_DATA = (\[[\s\S]*?\]);/);
      if (match) return JSON.parse(match[1]);
    } catch(e) { console.warn('Parse hatası:', e); }
    return getDefaultEvents();
  }

  function getDefaultEvents() {
    return [
      { day: "12", month: "Apr", venue: "Fabric", name: "b2b Night Vol. 4", city: "London, UK", ticketUrl: "#" }
    ];
  }

  // ─── RENDER ──────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('event-list');
    list.innerHTML = events.length === 0
      ? '<p style="opacity:0.3;font-size:0.85rem;padding:10px 0">Henüz event yok.</p>'
      : events.map((e, i) => `
          <div class="event-row">
            <div class="ev-date">${e.day} ${e.month}</div>
            <div class="ev-info">
              <div class="ev-name">${e.name}</div>
              <div class="ev-sub">${e.venue} — ${e.city}</div>
            </div>
            <button class="btn-del" onclick="deleteEvent(${i})">Sil</button>
          </div>
        `).join('');
  }

  function addEvent() {
    const day    = document.getElementById('f-day').value.trim();
    const month  = document.getElementById('f-month').value;
    const venue  = document.getElementById('f-venue').value.trim();
    const name   = document.getElementById('f-name').value.trim();
    const city   = document.getElementById('f-city').value.trim();
    const ticket = document.getElementById('f-ticket').value.trim() || '#';
    if (!day || !month || !venue || !name || !city) {
      alert('Lütfen tüm alanları doldur (Bilet URL hariç).');
      return;
    }
    events.push({ day, month, venue, name, city, ticketUrl: ticket });
    render();
    ['f-day','f-venue','f-name','f-city','f-ticket'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-month').value = '';
  }

  function deleteEvent(i) {
    if (!confirm(`"${events[i].name}" silinsin mi?`)) return;
    events.splice(i, 1);
    render();
  }

  // ─── GITHUB PUSH — index.html'i günceller ────────────────────────
  async function publishToGitHub() {
    if (!ghToken) {
      alert('Önce GitHub token\'ını gir ve kaydet!');
      return;
    }
    if (!siteHTML) {
      alert('Site verisi yüklenemedi. Sayfayı yenileyip tekrar dene.');
      return;
    }

    const btn = document.getElementById('btn-publish');
    const status = document.getElementById('publish-status');
    btn.disabled = true;
    btn.textContent = 'Güncelleniyor…';
    status.textContent = '';
    status.className = 'status';

    try {
      // index.html içindeki EVENTS_DATA'yı güncelle
      const newEventsJson = JSON.stringify(events);
      const newHTML = siteHTML.replace(
        /const EVENTS_DATA = \[[\s\S]*?\];/,
        `const EVENTS_DATA = ${newEventsJson};`
      );

      const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
      const headers = {
        'Authorization': `token ${ghToken}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      // SHA al
      let sha = null;
      const getRes = await fetch(apiBase, { headers });
      if (getRes.ok) sha = (await getRes.json()).sha;

      // Base64 encode
      const encoder = new TextEncoder();
      const bytes = encoder.encode(newHTML);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      const content = btoa(binary);

      const putRes = await fetch(apiBase, {
        method: 'PUT',
        headers,
        body: JSON.stringify({
          message: 'Update events via admin panel',
          content,
          branch: BRANCH,
          ...(sha ? { sha } : {})
        })
      });

      if (putRes.ok) {
        siteHTML = newHTML; // local cache güncelle
        status.textContent = '✓ Site güncellendi!';
        status.className = 'status ok';
      } else {
        const err = await putRes.json();
        throw new Error(err.message || 'GitHub API hatası');
      }
    } catch(e) {
      status.textContent = '✗ Hata: ' + e.message;
      status.className = 'status err';
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 Siteyi Güncelle';
    }
  }

  // Token durumu
  if (ghToken) {
    document.getElementById('token-status').innerHTML = '<span class="token-saved">✓ Token kayıtlı</span>';
  }

  init();
</script>
</body>
</html>
